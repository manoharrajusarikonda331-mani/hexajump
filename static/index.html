<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexaJump - Subway Endless Runner Engine</title>
    <link rel="icon" href="data:;base64,iVBORw0kGgo=">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="mobile-device-frame">

        <div id="loading-screen" class="active-view screen-layout">
            <div class="brand-title-group">
                <h1 class="runner-logo">HEXA</h1>
                <h1 class="runner-logo color-alt">JUMP</h1>
            </div>
            <div class="loader-chassis">
                <div class="bar-container">
                    <div id="boot-progress" class="bar-fill"></div>
                </div>
                <p class="telemetry-status">SYNCHRONIZING OPERATOR STATE...</p>
            </div>
        </div>

        <div id="top-nav-telemetry" class="hidden-view">
            <div class="sys-tag"><span class="live-blink"></span> CORE LIVE</div>
            <div class="wallet-tag"><span id="coin-count">0</span> 🪙</div>
        </div>

        <div id="store-screen" class="hidden-view screen-layout">
            <h2 class="section-title">OPERATOR SYSTEM</h2>
            <div id="dynamic-avatar-grid" class="chibi-store-grid"></div>
            <button id="store-action-btn" class="action-trigger-btn" disabled>SELECT PROFILE</button>
        </div>

        <div id="home-screen" class="hidden-view screen-layout">
            <div class="hub-profile-showcase">
                <div class="avatar-perspective-ring">
                    <img id="hub-avatar-img" src="" alt="Active Driver Profile">
                </div>
                <h3 id="hub-avatar-name">ALPHA</h3>
            </div>
            <div class="hub-control-stack">
                <button id="nav-to-modes-btn" class="stack-btn pulse-launch">TAP TO RUN</button>
                <button id="nav-back-to-store-btn" class="stack-btn cosmetic-btn">OPERATORS GEAR</button>
            </div>
        </div>

        <div id="modes-screen" class="hidden-view screen-layout">
            <h2 class="section-title">SECTOR MATRIX</h2>
            <div class="sectors-vertical-stack">
                <div class="sector-strip" data-mode="cyber">
                    <div class="sector-strip-bg bg-cyber"></div>
                    <span>CYBER CITY SECTOR</span>
                </div>
                <div class="sector-strip" data-mode="jungle">
                    <div class="sector-strip-bg bg-jungle"></div>
                    <span>MYSTIC CANOPY</span>
                </div>
                <div class="sector-strip" data-mode="volcano">
                    <div class="sector-strip-bg bg-volcano"></div>
                    <span>MAGMA CORE SUBWAY</span>
                </div>
                <div class="sector-strip" data-mode="space">
                    <div class="sector-strip-bg bg-space"></div>
                    <span>NEBULA STATION STAGE</span>
                </div>
                <div class="sector-strip" data-mode="grid">
                    <div class="sector-strip-bg bg-grid"></div>
                    <span>SYSTEM MATRIX GRID</span>
                </div>
            </div>
            <button id="launch-game-engine-btn" class="action-trigger-btn" disabled>ENGAGE SYSTEM LINK</button>
        </div>

        <div id="game-stage" class="hidden-view screen-layout">
            <div class="gameplay-hud-overlay">
                <button id="pause-engine-btn" class="hud-circle-btn">⏸️</button>
                <div id="live-score-tracker">SCORE: 0000</div>
                <button id="abort-to-home-btn" class="hud-circle-btn exit-btn">🏠</button>
            </div>

            <canvas id="gameCanvas" width="400" height="650"></canvas>
            
            <div id="pause-overlay" class="hidden-view runtime-modal-mask">
                <div class="stasis-card">
                    <h3>LOOP SUSPENDED</h3>
                    <p>Neural engine connection idling</p>
                    <button id="resume-engine-btn" class="modal-btn confirm-btn">RESUME CORE RUN</button>
                    <button id="pause-exit-home-btn" class="modal-btn abort-btn">RETURN TO HUB</button>
                </div>
            </div>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
