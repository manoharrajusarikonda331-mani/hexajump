<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexaJump - Premium Customization Dashboard</title>
    <link rel="icon" href="data:;base64,iVBORw0kGgo=">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="inventory-bar">
            <div class="system-tag"><span class="pulse-dot"></span> ENGINE LIVE</div>
            <div class="coin-display">COINS: <span id="player-coins">0</span> 🪙</div>
        </div>

        <div id="launcher-screen" class="menu-card">
            <h1>HEXAJUMP</h1>
            <p class="subtitle">Character Matrix Customization Store</p>
            
            <div id="dynamic-avatar-grid" class="avatar-grid"></div>

            <div class="action-row">
                <button id="store-action-btn" class="control-btn" disabled>Select Profile</button>
            </div>
        </div>

        <div id="game-stage" class="hidden">
            <canvas id="gameCanvas" width="800" height="450"></canvas>
            <div class="canvas-controls">
                <p>Use [ SPACEBAR ] or Click Canvas Frame to JUMP and scale difficulty levels!</p>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
